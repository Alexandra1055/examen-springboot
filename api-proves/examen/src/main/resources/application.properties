server.port=8080

# MySQL (docker-compose)
spring.datasource.url=jdbc:mysql://localhost:3306/sportsdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=sports
spring.datasource.password=sports

spring.jpa.hibernate.ddl-auto=update

# JWT (5 minuts)
application.security.jwt.secret=CHANGE_ME_PLEASE_32_CHARS_MINIMUM__1234567890
application.security.jwt.expiration-seconds=300
application.security.jwt.issuer=sports-api
